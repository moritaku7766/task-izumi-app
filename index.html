<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <!-- アプリアイコン -->
    <link
      rel="icon"
      href="/icon.png"
      type="image/png"
    />

    <!-- スマホ最適化 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- PWA -->
    <link
      rel="manifest"
      href="/manifest.webmanifest"
    />

    <!-- テーマカラー -->
    <meta
      name="theme-color"
      content="#2563eb"
    />

    <!-- iPhone PWA -->
    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- iPhoneホーム画面名 -->
    <meta
      name="apple-mobile-web-app-title"
      content="Task"
    />

    <!-- タイトル -->
    <title>Task App</title>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
